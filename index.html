<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Pao </title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;

    background:
    radial-gradient(circle at top,
    #2a1f4f 0%,
    #111827 45%,
    #06070d 100%);

    font-family:'Poppins', sans-serif;
}

/* CANVAS */

canvas{
    position:absolute;
    inset:0;

    transition:
    opacity 3s ease;
}

/* OSCURECEDOR */

.fade{
    position:absolute;
    inset:0;

    background:rgba(0,0,0,0.18);

    pointer-events:none;

    transition:
    background 3s ease,
    opacity 3s ease;
}

/* TITULO */

.titulo{

    position:absolute;

    top:5%;

    width:100%;

    text-align:center;

    color:white;

    opacity:0;

    animation:aparecer 4s ease 1s forwards;

    transition:opacity 3s ease;
}

.nombre{

    font-family:'Dancing Script', cursive;

    font-size:clamp(3rem,7vw,6rem);

    color:#ffd6ea;

    text-shadow:
    0 0 10px rgba(255,255,255,0.3),
    0 0 25px rgba(255,182,193,0.4),
    0 0 50px rgba(255,105,180,0.3);

    animation:flotar 5s ease-in-out infinite;
}

.subtitulo{

    margin-top:15px;

    font-size:clamp(1rem,2vw,1.5rem);

    font-weight:300;

    opacity:.85;

    letter-spacing:1px;
}

@keyframes flotar{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-8px);
    }

    100%{
        transform:translateY(0px);
    }
}

@keyframes aparecer{

    from{
        opacity:0;
        transform:translateY(-20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* FRASES */

.frase{

    position:absolute;

    bottom:8%;

    left:50%;

    transform:translateX(-50%);

    width:min(90%,900px);

    text-align:center;

    color:white;

    font-family:'Dancing Script', cursive;

    font-size:clamp(1.7rem,3vw,2.8rem);

    opacity:0;

    transition:opacity 2s ease;

    text-shadow:
    0 0 10px rgba(255,255,255,0.25),
    0 0 20px rgba(255,182,193,0.2);
}

/* FINAL */

.final{

    position:absolute;

    inset:0;

    display:flex;

    flex-direction:column;

    justify-content:center;
    align-items:center;

    color:white;

    opacity:0;

    transition:opacity 4s ease;

    pointer-events:none;

    background:
    radial-gradient(
        circle,
        rgba(20,10,30,0.95),
        rgba(0,0,0,1)
    );

    z-index:20;
}

.final-text{

    font-family:'Dancing Script', cursive;

    font-size:clamp(2rem,5vw,4rem);

    margin-bottom:45px;

    text-align:center;

    line-height:1.5;

    text-shadow:
    0 0 15px rgba(255,255,255,0.3),
    0 0 40px rgba(255,182,193,0.4);
}

/* CORAZON */

.corazon-container{

    opacity:0;

    transform:scale(0);

    transition:
    opacity 2s ease,
    transform 2s ease;
}

.corazon{

    position:relative;

    width:120px;
    height:120px;

    background:#ff5c9f;

    transform:rotate(-45deg);

    animation:latido 1.5s infinite;

    box-shadow:
    0 0 30px rgba(255,92,159,0.7),
    0 0 80px rgba(255,92,159,0.4);
}

.corazon::before,
.corazon::after{

    content:"";

    position:absolute;

    width:120px;
    height:120px;

    background:#ff5c9f;

    border-radius:50%;
}

.corazon::before{

    top:-60px;
    left:0;
}

.corazon::after{

    left:60px;
    top:0;

    animation:
    aura 3s infinite ease-in-out;
}

@keyframes aura{

    0%{
        box-shadow:
        0 0 20px rgba(255,92,159,0.3),
        0 0 40px rgba(255,92,159,0.2);
    }

    50%{
        box-shadow:
        0 0 60px rgba(255,92,159,0.7),
        0 0 120px rgba(255,92,159,0.4);
    }

    100%{
        box-shadow:
        0 0 20px rgba(255,92,159,0.3),
        0 0 40px rgba(255,92,159,0.2);
    }
}

@keyframes latido{

    0%{
        transform:rotate(-45deg) scale(1);
    }

    50%{
        transform:rotate(-45deg) scale(1.1);
    }

    100%{
        transform:rotate(-45deg) scale(1);
    }
}

/* CHISPAS */

.chispa{

    position:absolute;

    width:8px;
    height:8px;

    border-radius:50%;

    background:white;

    pointer-events:none;

    animation:subir 3s linear forwards;
}

@keyframes subir{

    0%{
        opacity:1;

        transform:
        translateY(0px)
        scale(1);
    }

    100%{
        opacity:0;

        transform:
        translateY(-220px)
        scale(0);
    }
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="fade"></div>

<div class="titulo">

    <div class="nombre">
        Para Pao, nuestra Raikage 
    </div>

    <div class="subtitulo">
        Hay personas que iluminan el mundo...
        y otras que lo hacen florecer.
    </div>

</div>

<div class="frase" id="frase"></div>

<div class="final" id="final">

    <div class="final-text">

         Felices 29 años, Pao <br><br>

        Gracias por existir.<br>
        Gracias por florecer incluso en los días difíciles.<br><br>

        Nunca dejes de brillar,<br>
        nuestra Raikage. 

    </div>

    <div class="corazon-container">

        <div class="corazon"></div>

    </div>

</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* FRASES */

const frases = [

"Algunas flores nacen hermosas. Otras aprenden a serlo.",

"Cada día llevas más luz que ayer.",

"Lo más bonito de ti es cómo sigues creciendo.",

"Florecer toma tiempo... y aun así lo estás logrando.",

"No floreciste rápido. Floreciste real.",

"Cada tormenta dejó algo más fuerte en ti.",

"El mundo cambia un poco cuando decides seguir brillando.",

"Hay flores que solo existen después de la lluvia."

];

let fraseIndex = 0;

const fraseDiv =
document.getElementById("frase");

function cambiarFrase(){

    fraseDiv.style.opacity = 0;

    setTimeout(()=>{

        fraseDiv.textContent =
        frases[fraseIndex];

        fraseDiv.style.opacity = 1;

        fraseIndex =
        (fraseIndex + 1)
        % frases.length;

    },1200);
}

setTimeout(()=>{

    cambiarFrase();

    setInterval(
        cambiarFrase,
        7000
    );

},3000);

/* ESTRELLAS */

class Estrella{

    constructor(){

        this.x =
        Math.random() * canvas.width;

        this.y =
        Math.random() * canvas.height;

        this.size =
        Math.random() * 2;

        this.opacity =
        Math.random();

        this.twinkle =
        Math.random()
        * Math.PI * 2;
    }

    draw(){

        this.twinkle += 0.01;

        const brillo =
        this.opacity +
        Math.sin(this.twinkle)
        * 0.3;

        ctx.fillStyle =
        `rgba(255,255,255,
        ${brillo})`;

        ctx.beginPath();

        ctx.arc(
            this.x,
            this.y,
            this.size,
            0,
            Math.PI * 2
        );

        ctx.fill();
    }
}

const estrellas = [];

for(let i=0;i<180;i++){

    estrellas.push(
        new Estrella()
    );
}

/* PARTICULAS */

class Particula{

    constructor(){

        this.reset();
    }

    reset(){

        this.x =
        Math.random()
        * canvas.width;

        this.y =
        Math.random()
        * canvas.height;

        this.size =
        Math.random() * 3 + 1;

        this.speed =
        Math.random() * 0.5 + 0.2;

        this.opacity =
        Math.random() * 0.5 + 0.2;
    }

    update(){

        this.y -= this.speed;

        if(this.y < -10){

            this.reset();

            this.y =
            canvas.height + 10;
        }
    }

    draw(){

        ctx.fillStyle =
        `rgba(255,255,255,
        ${this.opacity})`;

        ctx.beginPath();

        ctx.arc(
            this.x,
            this.y,
            this.size,
            0,
            Math.PI * 2
        );

        ctx.fill();
    }
}

const particulas = [];

for(let i=0;i<70;i++){

    particulas.push(
        new Particula()
    );
}

/* PETALOS */

class Petalo{

    constructor(){

        this.reset();
    }

    reset(){

        this.x =
        Math.random()
        * canvas.width;

        this.y = -20;

        this.size =
        Math.random() * 10 + 6;

        this.speed =
        Math.random() * 1 + 0.5;

        this.swing =
        Math.random()
        * Math.PI * 2;
    }

    update(){

        this.y += this.speed;

        this.swing += 0.02;

        this.x +=
        Math.sin(this.swing)
        * 0.5;

        if(this.y >
        canvas.height + 20){

            this.reset();
        }
    }

    draw(){

        ctx.fillStyle =
        "rgba(255,192,203,0.7)";

        ctx.beginPath();

        ctx.ellipse(
            this.x,
            this.y,
            this.size * 0.6,
            this.size,
            Math.sin(this.swing),
            0,
            Math.PI * 2
        );

        ctx.fill();
    }
}

const petalos = [];

for(let i=0;i<25;i++){

    petalos.push(
        new Petalo()
    );
}

/* TULIPAN */

class Tulipan{

    constructor(){

        this.x =
        canvas.width / 2;

        this.y =
        canvas.height * 0.88;

        this.height = 0;

        this.maxHeight = 300;

        this.open = 0;

        this.time = 0;
    }

    update(){

        this.time += 0.015;

        if(
            this.height <
            this.maxHeight
        ){

            this.height += 0.45;
        }

        if(
            this.height >
            this.maxHeight * 0.7
        ){

            this.open += 0.003;

            if(this.open > 1){

                this.open = 1;
            }
        }
    }

    draw(){

        const topY =
        this.y - this.height;

        const glow =
        ctx.createRadialGradient(

            this.x,
            topY,
            0,

            this.x,
            topY,
            160
        );

        glow.addColorStop(
            0,
            "rgba(255,220,230,0.35)"
        );

        glow.addColorStop(
            1,
            "rgba(255,220,230,0)"
        );

        ctx.fillStyle = glow;

        ctx.beginPath();

        ctx.arc(
            this.x,
            topY,
            160,
            0,
            Math.PI * 2
        );

        ctx.fill();

        /* TALLO */

        ctx.strokeStyle =
        "#5bbf71";

        ctx.lineWidth = 5;

        ctx.lineCap = "round";

        ctx.beginPath();

        ctx.moveTo(
            this.x,
            this.y
        );

        ctx.quadraticCurveTo(

            this.x +
            Math.sin(this.time)
            * 18,

            this.y -
            this.height / 2,

            this.x,

            topY
        );

        ctx.stroke();

        /* FLOR */

        const apertura =
        this.open * 38;

        ctx.shadowColor =
        "rgba(255,180,210,0.6)";

        ctx.shadowBlur = 25;

        ctx.fillStyle =
        "#ff9ecb";

        /* IZQ */

        ctx.beginPath();

        ctx.moveTo(
            this.x,
            topY
        );

        ctx.quadraticCurveTo(

            this.x - 35
            - apertura,

            topY - 40,

            this.x - 10,

            topY - 95
        );

        ctx.quadraticCurveTo(

            this.x - 5,

            topY - 45,

            this.x,

            topY
        );

        ctx.fill();

        /* DER */

        ctx.beginPath();

        ctx.moveTo(
            this.x,
            topY
        );

        ctx.quadraticCurveTo(

            this.x + 35
            + apertura,

            topY - 40,

            this.x + 10,

            topY - 95
        );

        ctx.quadraticCurveTo(

            this.x + 5,

            topY - 45,

            this.x,

            topY
        );

        ctx.fill();

        /* CENTRAL */

        ctx.fillStyle =
        "#ffc2dc";

        ctx.beginPath();

        ctx.moveTo(
            this.x,
            topY
        );

        ctx.quadraticCurveTo(

            this.x - 20,

            topY - 40,

            this.x,

            topY - 120
            - (this.open * 10)
        );

        ctx.quadraticCurveTo(

            this.x + 20,

            topY - 40,

            this.x,

            topY
        );

        ctx.fill();

        ctx.shadowBlur = 0;
    }
}

const tulipan =
new Tulipan();

let finalMostrado = false;

/* CHISPAS */

function crearChispa(){

    const chispa =
    document.createElement("div");

    chispa.classList.add("chispa");

    const x =
    window.innerWidth / 2 +
    (Math.random() * 220 - 110);

    const y =
    window.innerHeight / 2 + 100;

    chispa.style.left =
    x + "px";

    chispa.style.top =
    y + "px";

    chispa.style.background =
    `hsl(
        ${Math.random()*60+320},
        100%,
        80%
    )`;

    document.body
    .appendChild(chispa);

    setTimeout(()=>{

        chispa.remove();

    },3000);
}

/* ANIMACION */

function animar(){

    requestAnimationFrame(animar);

    /* FONDO */

    const gradient =
    ctx.createLinearGradient(
        0,
        0,
        0,
        canvas.height
    );

    gradient.addColorStop(
        0,
        "#1f1b3d"
    );

    gradient.addColorStop(
        1,
        "#08090f"
    );

    ctx.fillStyle = gradient;

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    estrellas.forEach(e=>{

        e.draw();
    });

    particulas.forEach(p=>{

        p.update();
        p.draw();
    });

    petalos.forEach(p=>{

        p.update();
        p.draw();
    });

    tulipan.update();
    tulipan.draw();

    /* FINAL */

    if(
        tulipan.open >= 1 &&
        !finalMostrado
    ){

        finalMostrado = true;

        /* OCULTAR TODO */

        setTimeout(()=>{

            document
            .querySelector(".titulo")
            .style.opacity = 0;

            document
            .querySelector(".frase")
            .style.opacity = 0;

            document
            .querySelector(".fade")
            .style.background =
            "rgba(0,0,0,0.85)";

        },1000);

        /* MOSTRAR FINAL */

        setTimeout(()=>{

            canvas.style.opacity = 0;

            document
            .getElementById("final")
            .style.opacity = 1;

            setTimeout(()=>{

                const corazon =
                document.querySelector(
                ".corazon-container"
                );

                corazon.style.opacity = 1;

                corazon.style.transform =
                "scale(1)";

                for(let i=0;i<180;i++){

                    setTimeout(()=>{

                        crearChispa();

                    },i * 20);
                }

            },1500);

        },3500);
    }
}

animar();

/* RESPONSIVE */

window.addEventListener(
"resize",
()=>{

    canvas.width =
    window.innerWidth;

    canvas.height =
    window.innerHeight;

    tulipan.x =
    canvas.width / 2;

    tulipan.y =
    canvas.height * 0.88;
});

</script>

</body>
</html>
